root = "."
tmp_dir = "tmp"

[build]
cmd = "GOCACHE=/tmp/go-build go build -tags sqlite_fts5 -o ./tmp/practicehelper-api ./cmd/api"
bin = "./tmp/practicehelper-api"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "testdata"]
exclude_regex = ["_test.go"]
delay = 300
stop_on_error = true
send_interrupt = true

[log]
time = true
